spring:
  profiles:
    active: test
  application:
    name: vaxjobostader
  datasource:
    driver-class-name: org.h2.Driver
    url: 'jdbc:h2:mem:db;DB_CLOSE_DELAY=-1'
    username: sa
    password: sa
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml
    enabled: false # Enable Liquibase (it's enabled by default, but being explicit is fine)
  jpa:
    hibernate:
      ddl-auto: create # Disable Hibernate DDL auto (since Liquibase is managing the schema)
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect # Set the correct dialect for H2

appconfig:
  vbUrl: ${VB_URL:https://bpvx.vaxjo.se/API/Service/SearchServiceHandler.ashx}
  slackWebhookUrl: https://hooks.slack.com/services/...
  slackCron: ${SLACK_CRON:0 0 0 * * *}
  lastDateCron: '0 30 7 * * ?'
  configFilePath: 'classpath:homeSearchConfig.json'