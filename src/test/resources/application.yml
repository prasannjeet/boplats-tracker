spring:
  profiles:
    active: test
  application:
    name: vaxjobostader
  datasource:
    driver-class-name: org.h2.Driver
    url: 'jdbc:h2:mem:db;DB_CLOSE_DELAY=-1'
    username: sa
    password: sa
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

appconfig:
  vbUrl: https://vidingehem-fastighet.momentum.se/Prod/Vidingehem/PmApi/v2/market/objects
  vbApiKey: test-api-key
  slackWebhookUrl: https://hooks.slack.com/services/...
  vxPrefixLink: https://example.com/
  listApiCacheDurationHours: 24
  detailRefreshIntervalHours: 12
  detailFetchMinDelaySeconds: 30
  detailFetchMaxDelaySeconds: 1800
  detailFetchIdleDelaySeconds: 1800
