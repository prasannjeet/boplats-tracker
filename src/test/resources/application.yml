spring:
  application:
    name: vaxjobostader
  datasource:
    driver-class-name: org.h2.Driver
    url: 'jdbc:h2:mem:db;DB_CLOSE_DELAY=-1'
    username: sa
    password: sa
  jpa:
    hibernate:
      ddl-auto: create

appconfig:
  vbUrl: ${VB_URL:https://bpvx.vaxjo.se/API/Service/SearchServiceHandler.ashx}
  slackUrl: ${SLACK_URL:https://hooks.slack.com/services/...}
  databaseUpdateCron: ${DATABASE_UPDATE_CRON:0 0 0 * * *}
  slackCron: ${SLACK_CRON:0 0 0 * * *}