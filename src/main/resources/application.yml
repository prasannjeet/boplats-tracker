spring:
  liquibase:
    change-log: classpath:/db.changelog-master.xml
    enabled: true
  application:
    name: vaxjobostader
  datasource:
    url: jdbc:mysql://${HOSTNAME:localhost}:${DATABASE_PORT:3306}/${DATABASE_NAME:vaxjo}?useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DATABASE_USERNAME:vaxjo}
    password: ${DATABASE_PASSWORD}
    hikari:
      max-lifetime: 600000
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:none}
    database: MYSQL
    database-platform: ${DATABASE_DIALECT:org.hibernate.dialect.MySQLDialect}

server:
  port: ${SERVER_PORT:8080}

log:
  project: ${LOG_LEVEL:INFO}
  spring: ${SPRING_LOG_LEVEL:INFO}

appconfig:
  vbUrl: ${VB_URL}
  vbApiKey: ${VB_API_KEY}
  listApiCacheDurationHours: ${LIST_API_CACHE_DURATION_HOURS:24}
  detailRefreshIntervalHours: ${DETAIL_REFRESH_INTERVAL_HOURS:12}
  detailFetchMinDelaySeconds: ${DETAIL_FETCH_MIN_DELAY_SECONDS:30}
  detailFetchMaxDelaySeconds: ${DETAIL_FETCH_MAX_DELAY_SECONDS:1800}
  detailFetchIdleDelaySeconds: ${DETAIL_FETCH_IDLE_DELAY_SECONDS:1800}
  slackWebhookUrl: ${SLACK_WEBHOOK_URL}
  vxPrefixLink: ${VX_PREFIX_LINK}
  geocoding:
    enabled: ${GEOCODING_ENABLED:true}
    baseUrl: ${GEOCODING_BASE_URL:https://nominatim.openstreetmap.org}
    userAgent: ${GEOCODING_USER_AGENT:boplats-tracker/1.0}
    rateLimitMs: ${GEOCODING_RATE_LIMIT_MS:1100}
