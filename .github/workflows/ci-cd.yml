name: CI/CD Pipeline

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  JAVA_VERSION: '25'
  MAVEN_OPTS: '-Xmx1024m -XX:+TieredCompilation -XX:TieredStopAtLevel=1'
  NEXUS_DOCKER_REGISTRY: ${{ vars.NEXUS_DOCKER_REGISTRY || 'docker.nexus.coolify.ooguy.com' }}
  NEXUS_MAVEN_REPOSITORY_URL: ${{ vars.NEXUS_MAVEN_REPOSITORY_URL || 'https://nexus.coolify.ooguy.com/repository/maven-public/' }}
  DOCKER_IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME || 'vb-back' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      checks: write
      pull-requests: write
    environment:
      name: docker-registry
      url: https://${{ vars.NEXUS_DOCKER_REGISTRY || 'docker.nexus.coolify.ooguy.com' }}/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: corretto
          cache: maven

      - name: Set up Maven settings
        uses: s4u/maven-settings-action@v3.0.0
        with:
          servers: |
            [{
              "id": "maven-public",
              "username": "${{ secrets.NEXUS_USERNAME }}",
              "password": "${{ secrets.NEXUS_PASSWORD }}"
            },
            {
              "id": "nexus-mirror",
              "username": "${{ secrets.NEXUS_USERNAME }}",
              "password": "${{ secrets.NEXUS_PASSWORD }}"
            }]
          mirrors: |
            [{
              "id": "nexus-mirror",
              "mirrorOf": "central",
              "name": "Nexus Mirror for Maven Central",
              "url": "${{ env.NEXUS_MAVEN_REPOSITORY_URL }}"
            }]
          repositories: |
            [{
              "id": "maven-public",
              "url": "${{ env.NEXUS_MAVEN_REPOSITORY_URL }}",
              "releases": {"enabled": "true", "updatePolicy": "never"},
              "snapshots": {"enabled": "true", "updatePolicy": "always"}
            }]

      - name: Cache frontend dependencies
        uses: actions/cache@v4
        with:
          path: |
            .frontend-tools
            frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/pnpm-lock.yaml', 'pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-frontend-

      - name: Extract project information
        id: project
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "artifact_id=$ARTIFACT_ID" >> "$GITHUB_OUTPUT"
          echo "Detected $ARTIFACT_ID:$VERSION"

      - name: Build frontend, test backend, and package application
        run: |
          mvn clean package -Ddocker.skip=true --batch-mode --no-transfer-progress

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Maven Test Results
          path: target/surefire-reports/TEST-*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Prepare Docker build context
        if: |
          success() &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
          (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        run: |
          ARTIFACT_ID="${{ steps.project.outputs.artifact_id }}"
          VERSION="${{ steps.project.outputs.version }}"

          mkdir -p target/docker-context/maven
          cp "target/${ARTIFACT_ID}-${VERSION}.jar" "target/docker-context/maven/${ARTIFACT_ID}-${VERSION}.jar"
          cp src/main/docker/entrypoint.sh target/docker-context/entrypoint.sh
          sed \
            -e "s/@project.artifactId@/${ARTIFACT_ID}/g" \
            -e "s/@project.version@/${VERSION}/g" \
            src/main/docker/Dockerfile > target/docker-context/Dockerfile

      - name: Set up QEMU
        if: |
          success() &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
          (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: |
          success() &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
          (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: docker/setup-buildx-action@v3

      - name: Log in to Nexus Docker Registry
        if: |
          success() &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
          (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.NEXUS_DOCKER_REGISTRY }}
          username: ${{ secrets.NEXUS_DOCKER_USERNAME || secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_DOCKER_PASSWORD || secrets.NEXUS_PASSWORD }}

      - name: Extract Docker metadata
        if: |
          success() &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
          (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.NEXUS_DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=${{ steps.project.outputs.version }}
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push multi-architecture Docker image
        if: |
          success() &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
          (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: docker/build-push-action@v6
        with:
          context: target/docker-context
          file: target/docker-context/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Trigger Coolify deployment
        id: deploy
        if: |
          success() &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
          (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X GET \
            "${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          RESPONSE_BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $RESPONSE_BODY"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            MESSAGE=$(echo "$RESPONSE_BODY" | jq -r '.deployments[0].message // .message // "Deployment triggered"')
            RESOURCE_UUID=$(echo "$RESPONSE_BODY" | jq -r '.deployments[0].resource_uuid // "N/A"')
            DEPLOYMENT_UUID=$(echo "$RESPONSE_BODY" | jq -r '.deployments[0].deployment_uuid // "N/A"')

            echo "deploy_status=success" >> "$GITHUB_OUTPUT"
            echo "deploy_message=$MESSAGE" >> "$GITHUB_OUTPUT"
            echo "resource_uuid=$RESOURCE_UUID" >> "$GITHUB_OUTPUT"
            echo "deployment_uuid=$DEPLOYMENT_UUID" >> "$GITHUB_OUTPUT"
          else
            ERROR_MESSAGE=$(echo "$RESPONSE_BODY" | jq -r '.message // "Coolify deployment webhook failed"')
            echo "deploy_status=failed" >> "$GITHUB_OUTPUT"
            echo "deploy_message=$ERROR_MESSAGE" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create deployment summary
        if: |
          always() &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
          (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        run: |
          echo "## Docker Image Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version**: ${{ steps.project.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch**: ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Registry**: ${{ env.NEXUS_DOCKER_REGISTRY }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image**: \`${{ env.NEXUS_DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.project.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Platforms**: linux/amd64, linux/arm64" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tags**:" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" | sed 's/^/  - /' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Coolify Deployment" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.deploy.outputs.deploy_status }}" = "success" ]; then
            echo "- **Status**: Successfully triggered" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Message**: ${{ steps.deploy.outputs.deploy_message }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Resource UUID**: \`${{ steps.deploy.outputs.resource_uuid }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Deployment UUID**: \`${{ steps.deploy.outputs.deployment_uuid }}\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- **Status**: Failed or skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Message**: ${{ steps.deploy.outputs.deploy_message }}" >> "$GITHUB_STEP_SUMMARY"
          fi
